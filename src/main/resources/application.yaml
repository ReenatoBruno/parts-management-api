spring:
  application:
    name: part-management-api
  profiles:
    active: dev
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
  api-docs:
    path: /api-docs
---
# DEV
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:managing-parts-inventory;DB_CLOSE_DELAY=-1
    username: ${H2_USER:sa}
    password: ${H2_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    properties:
      "[hibernate.format_sql]": true
      "[hibernate.jdbc.time_zone]": UTC
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/main
      - classpath:db/migration/dev
---
# PROD
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:parts_api}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    locations:
      - classpath:db/migration/main
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false